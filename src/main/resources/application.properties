# ─── Application ──────────────────────────────────────────────────────────────
quarkus.application.name=good-scan
quarkus.http.root-path=/api

# ─── Quinoa (React PWA frontend) ──────────────────────────────────────────────
# Dev mode: Quinoa proxies to the Vite dev server on port 5173
quarkus.quinoa.dev-server.port=5173
# Package manager — set to npm (default)
quarkus.quinoa.package-manager=npm
# UI source root relative to project
quarkus.quinoa.ui-dir=src/main/webui
# Build output dir inside the webui folder
quarkus.quinoa.build-dir=dist
# Exclude the Swagger UI path from the Quinoa SPA fallback
quarkus.quinoa.ignored-path-prefixes=/api,/q

# ─── OpenAPI / Swagger ────────────────────────────────────────────────────────
quarkus.smallrye-openapi.info-title=Good Scan API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=CCCM Conference volunteer scan service
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# ─── CORS ─────────────────────────────────────────────────────────────────────
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=*,Authorization,Content-Type

# ─── Hibernate naming ─────────────────────────────────────────────────────────
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# ─── Domain config ────────────────────────────────────────────────────────────
meal.timezone=America/Chicago
meal.event.id=89

# ─── JWT (Phase 1 stub — routes open; full Cognito wiring in Phase 2) ─────────
mp.jwt.verify.publickey.location=META-INF/resources/publicKey.pem
mp.jwt.verify.issuer=https://auth.cccmbiz.com

# ─── Health ───────────────────────────────────────────────────────────────────
quarkus.smallrye-health.root-path=/health

# ═══ DEV profile ══════════════════════════════════════════════════════════════
%dev.quarkus.http.port=8088
%dev.quarkus.datasource.db-kind=mariadb
%dev.quarkus.datasource.username=cccmdev
%dev.quarkus.datasource.password=my-secret-pw
%dev.quarkus.datasource.jdbc.url=jdbc:mariadb://localhost:3306/good
%dev.quarkus.hibernate-orm.database.generation=none
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.swagger-ui.always-include=true

# ═══ PROD profile ═════════════════════════════════════════════════════════════
%prod.quarkus.http.port=8088
%prod.quarkus.datasource.db-kind=mysql
%prod.quarkus.datasource.username=${DB_USERNAME}
%prod.quarkus.datasource.password=${DB_PASSWORD}
%prod.quarkus.datasource.jdbc.url=${DB_URL}
%prod.quarkus.hibernate-orm.database.generation=none
%prod.quarkus.hibernate-orm.log.sql=false
%prod.quarkus.log.level=ERROR
%prod.quarkus.log.category."com.cccmbiz".level=INFO

# ═══ TEST profile ═════════════════════════════════════════════════════════════
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.hibernate-orm.sql-load-script=import-test.sql
# Disable Quinoa in tests (no Node.js needed)
%test.quarkus.quinoa.enabled=false
